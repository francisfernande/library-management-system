<!DOCTYPE html>
<html>
<head>
    <title>View Books</title>
</head>
<body style="font-family: Arial; text-align:center;">

    <h2>📖 All Books</h2>

    <table border="1" align="center" cellpadding="10">
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Author</th>
            <th>Shelf</th>
            <th>Status</th>
        </tr>

        {% for book in books %}
        <tr>
            <td>{{ book[0] }}</td>
            <td>{{ book[1] }}</td>
            <td>{{ book[2] }}</td>
            <td>{{ book[3] }}</td>
            <td>
                {% if book[4] %}
                    Issued to <strong>{{ book[4] }}</strong>
                {% else %}
                    Available
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </table>

    <br><br>
    <!-- One Back Link Logic -->
    <a href="{{ '/dashboard' if session.get('librarian') else '/' }}">⬅ Back</a>

</body>
</html>
