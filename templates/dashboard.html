<!DOCTYPE html>
<html>
<head>
<title>Librarian Dashboard</title>

<style>

body{
    font-family: Arial;
    background:#eef4ff;
    text-align:center;
}

/* Title */
h2{
    margin-top:40px;
    color:#2c3e50;
}

/* button container */
.menu{
    margin-top:60px;
}

/* dashboard buttons */
.btn{
    display:block;
    width:320px;
    margin:20px auto;
    padding:18px;
    font-size:20px;
    font-weight:bold;
    text-decoration:none;
    border-radius:12px;
    color:white;
}

/* colors */
.add{ background:#27ae60; }

.issue{ background:#3498db; }

.issued{ background:#9b59b6; }

.view{ background:#f39c12; }

.logout{ background:#e74c3c; }

/* hover */
.btn:hover{
    transform:scale(1.05);
}

</style>

</head>

<body>

<h2>👨‍💼 Librarian Dashboard</h2>

<div class="menu">

<a class="btn add" href="/add_book">
➕ Add Book
</a>

<a class="btn issue" href="/issue_book">
📤 Issue Book
</a>

<a class="btn issued" href="/issued_book">
📥 Issued Books
</a>

<a class="btn view" href="/view_books">
📚 View Books
</a>

<a class="btn logout" href="/logout">
🚪 Logout
</a>

</div>

</body>
</html>
