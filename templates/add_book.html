<!DOCTYPE html>
<html>
<head>
    <title>Add Book</title>
</head>

<body style="font-family: Arial; text-align:center;">

<h2>➕ Add New Book</h2>

<form method="POST">

<input type="text" name="title" placeholder="Book Title" required>
<br><br>

<input type="text" name="author" placeholder="Author" required>
<br><br>

<input type="text" name="shelf" placeholder="Shelf Location">
<br><br>

<input type="text" name="accession_no" placeholder="Accession No">
<br><br>

<input type="text" name="publisher" placeholder="Publisher Name">
<br><br>

<input type="number" name="year" placeholder="Year of Publication">
<br><br>

<input type="number" name="pages" placeholder="Pages">
<br><br>

<input type="text" name="book_no" placeholder="Book No">
<br><br>

<input type="number" step="0.01" name="cost" placeholder="Cost">
<br><br>

<input type="text" name="source" placeholder="Source (Donation / Purchase)">
<br><br>

<button type="submit">Add Book</button>

</form>

<br><br>

{% if session.get('librarian') %}
<a href="/dashboard">⬅ Back to Dashboard</a>
{% else %}
<a href="/">⬅ Back to Home</a>
{% endif %}

</body>
</html>
