<!DOCTYPE html>

<html>
<head>
    <title>Issued Books</title>

<style>
    body{
        font-family: Arial;
        text-align: center;
    }

    table{
        margin: auto;
        border-collapse: collapse;
        width: 70%;
    }

    th, td{
        border: 1px solid black;
        padding: 10px;
    }

    th{
        background-color: #f2f2f2;
    }

    a{
        text-decoration: none;
        font-size: 16px;
    }
</style>

</head>

<body>

<h2>📚 Issued Books</h2>

<table>

<tr>
<th>ID</th>
<th>Book ID</th>
<th>Student Name</th>
<th>Issue Date</th>
</tr>

{% for book in books %}

<tr>
<td>{{ book[0] }}</td>
<td>{{ book[1] }}</td>
<td>{{ book[2] }}</td>
<td>{{ book[3] }}</td>
</tr>
{% endfor %}

</table>

<br><br>

<a href="/dashboard">⬅ Back to Dashboard</a>

</body>
</html>
